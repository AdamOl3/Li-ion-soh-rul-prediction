<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Battery SOH & RUL Predictor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: radial-gradient(
          circle at top left,
          #1f2740 0,
          #050712 45%,
          #02030a 100%
        );
        color: #f5f7ff;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }

      .window {
        width: 1180px;
        height: 690px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 60px;
        background: transparent;
        border-radius: 0;
        box-shadow: none;
      }

      .panel {
        width: 880px;
        border-radius: 32px;
        padding: 46px 64px 30px;
        background: radial-gradient(
          circle at top left,
          #292e40 0,
          #141726 42%,
          #0b0e1a 100%
        );
        box-shadow: 0 32px 60px rgba(0, 0, 0, 0.9),
          0 -1px 0 rgba(255, 255, 255, 0.04), 0 1px 0 rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 26px;

        transform: scale(1.3);
        transform-origin: center center;
      }

      .title {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: #f7f8ff;
        text-align: center;
      }

      .inputs-row {
        display: flex;
        justify-content: center;
        gap: 84px;
        width: 100%;
        margin-top: 6px;
      }

      .inputs-column {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .chip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 12px 9px 16px;
        width: 260px;
        border-radius: 999px;
        background: linear-gradient(145deg, #252a3b, #181a29);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.9),
          0 0 0 1px rgba(255, 255, 255, 0.03),
          0 0 0 1px rgba(0, 0, 0, 0.85) inset;
        font-size: 11px;
        letter-spacing: 0.06em;
        color: #d4d8ea;
      }

      .chip-label {
        flex: 1;
        padding-right: 10px;
        white-space: nowrap;
      }

      .chip-value {
        flex-shrink: 0;
        width: 90px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 4px 12px;
        border-radius: 999px;
        background: linear-gradient(145deg, #30374d, #1d2133);
        font-size: 11px;
        color: #f5f6ff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.85),
          0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      .chip-input {
        width: 52px;
        background: transparent;
        border: none;
        outline: none;
        font-family: inherit;
        font-size: 11px;
        font-weight: 500;
        color: #f5f6ff;
        text-align: right;
        -moz-appearance: textfield;
      }

      .chip-input::-webkit-outer-spin-button,
      .chip-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .chip-input::placeholder {
        color: rgba(245, 246, 255, 0.35);
      }

      .chip-input:focus {
        color: #ffffff;
      }

      .chip-value-unit {
        font-size: 9px;
        opacity: 0.8;
        text-transform: uppercase;
      }

      .buttons-row {
        display: flex;
        gap: 18px;
        margin-top: 18px;
      }

      .btn {
        min-width: 110px;
        height: 38px;
        border-radius: 19px;
        border: none;
        outline: none;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: transform 0.08s ease, box-shadow 0.08s ease,
          background 0.1s ease, filter 0.08s ease;
      }

      .btn-sample,
      .btn-clear {
        background: radial-gradient(
          circle at top left,
          #272c3e 0,
          #181b29 65%,
          #121524 100%
        );
        color: #f5f7ff;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.95),
          0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      .btn-predict {
        background: linear-gradient(145deg, #2964ff, #1450f1);
        color: #f8fbff;
        box-shadow: none;
        transition: transform 0.08s ease, box-shadow 0.12s ease,
          filter 0.08s ease;
      }

      .btn:hover {
        filter: brightness(1.07);
      }

      .btn-predict:active {
        box-shadow: 0 16px 30px rgba(24, 90, 255, 0.75),
          0 0 0 1px rgba(255, 255, 255, 0.1);
        transform: translateY(1px);
      }

      .bottom-cards {
        width: 100%;
        display: grid;
        grid-template-columns: 1.05fr 1.05fr 1.4fr;
        gap: 20px;
        margin-top: 14px;
      }

      .metric-card {
        border-radius: 22px;
        padding: 20px 24px;
        background: radial-gradient(
          circle at top left,
          #181b28 0,
          #101321 45%,
          #080b14 100%
        );
        box-shadow: 0 22px 40px rgba(0, 0, 0, 0.95),
          0 0 0 1px rgba(255, 255, 255, 0.03);
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
      }

      .metric-label {
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #c9cede;
      }

      .metric-value {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 0.03em;
        color: #f5f7ff;
      }

      .cond-good {
        color: #41d17f;
      }
      .cond-mid {
        color: #ffc94a;
      }
      .cond-bad {
        color: #ff4d4d;
      }

      .condition-text {
        font-size: 18px;
        font-weight: 700;
      }

      .condition-sub {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .status-bar {
        margin-top: 16px;
        width: 100%;
        border-radius: 20px;
        padding: 15px 26px;
        background: radial-gradient(
          circle at top left,
          #191c2a 0,
          #101322 55%,
          #090b15 100%
        );
        box-shadow: 0 20px 34px rgba(0, 0, 0, 0.95),
          0 0 0 1px rgba(255, 255, 255, 0.03);
        font-size: 13px;
        color: #d1d6e7;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="window">
      <div class="panel">
        <div class="title">Battery SOH &amp; RUL Predictor</div>

        <div class="inputs-row">
          <div class="inputs-column">
            <div class="chip">
              <span class="chip-label">Load Current</span>
              <span class="chip-value">
                <input
                  id="loadCurrent"
                  class="chip-input"
                  type="text"
                  inputmode="decimal"
                  placeholder="—"
                  value=""
                />
                <span class="chip-value-unit">A</span>
              </span>
            </div>

            <div class="chip">
              <span class="chip-label">Measured Current</span>
              <span class="chip-value">
                <input
                  id="measuredCurrent"
                  class="chip-input"
                  type="text"
                  inputmode="decimal"
                  placeholder="—"
                  value=""
                />
                <span class="chip-value-unit">A</span>
              </span>
            </div>

            <div class="chip">
              <span class="chip-label">Temperature</span>
              <span class="chip-value">
                <input
                  id="temperature"
                  class="chip-input"
                  type="text"
                  inputmode="decimal"
                  placeholder="—"
                  value=""
                />
                <span class="chip-value-unit">°C</span>
              </span>
            </div>
          </div>

          <div class="inputs-column">
            <div class="chip">
              <span class="chip-label">Load Voltage</span>
              <span class="chip-value">
                <input
                  id="loadVoltage"
                  class="chip-input"
                  type="text"
                  inputmode="decimal"
                  placeholder="—"
                  value=""
                />
                <span class="chip-value-unit">V</span>
              </span>
            </div>

            <div class="chip">
              <span class="chip-label">Measured Voltage</span>
              <span class="chip-value">
                <input
                  id="measuredVoltage"
                  class="chip-input"
                  type="text"
                  inputmode="decimal"
                  placeholder="—"
                  value=""
                />
                <span class="chip-value-unit">V</span>
              </span>
            </div>

            <div class="chip">
              <span class="chip-label">Time</span>
              <span class="chip-value">
                <input
                  id="time"
                  class="chip-input"
                  type="text"
                  inputmode="decimal"
                  placeholder="—"
                  value=""
                />
                <span class="chip-value-unit">s</span>
              </span>
            </div>
          </div>
        </div>

        <div class="buttons-row">
          <button class="btn btn-sample" type="button">Sample</button>
          <button class="btn btn-clear" type="button">Clear</button>
          <button class="btn btn-predict" type="button">Predict</button>
        </div>

        <div class="bottom-cards">
          <div class="metric-card">
            <div class="metric-label">SOH</div>
            <div class="metric-value" id="sohValue">—</div>
          </div>

          <div class="metric-card">
            <div class="metric-label">RUL</div>
            <div class="metric-value" id="rulValue">—</div>
          </div>

          <div class="metric-card">
            <div class="metric-label">Kondycja</div>
            <div class="condition-text">
              <span class="metric-value" id="condValue">—</span>
              <span class="condition-sub" id="condText"></span>
            </div>
          </div>
        </div>

        <div class="status-bar" id="statusBar">
          Wpisz dane i kliknij Predict.
        </div>
      </div>
    </div>

    <script type="text/javascript">
      function setup(htmlComponent) {
        const predictBtn = document.querySelector(".btn-predict");
        const clearBtn = document.querySelector(".btn-clear");
        const sampleBtn = document.querySelector(".btn-sample");

        const id = (x) => document.getElementById(x);

        const sohEl = id("sohValue");
        const rulEl = id("rulValue");
        const condValEl = id("condValue");
        const condTxtEl = id("condText");
        const statusEl = id("statusBar");

        function parseNumberPL(value) {
          if (value === undefined || value === null) return 0;
          const s = value.toString().trim();
          if (!s) return 0;
          const v = parseFloat(s.replace(",", "."));
          return Number.isFinite(v) ? v : 0;
        }

        function readInputs() {
          return {
            loadCurrent: parseNumberPL(id("loadCurrent").value),
            measuredCurrent: parseNumberPL(id("measuredCurrent").value),
            temperature: parseNumberPL(id("temperature").value),
            loadVoltage: parseNumberPL(id("loadVoltage").value),
            measuredVoltage: parseNumberPL(id("measuredVoltage").value),
            time: parseNumberPL(id("time").value),
          };
        }

        function resetOutputs() {
          if (sohEl) sohEl.textContent = "—";
          if (rulEl) rulEl.textContent = "—";
          if (condValEl) {
            condValEl.textContent = "—";
            condValEl.classList.remove("cond-good", "cond-mid", "cond-bad");
          }
          if (condTxtEl) condTxtEl.textContent = "";
        }

        function setConditionColor(condValue) {
          if (!condValEl) return;
          condValEl.classList.remove("cond-good", "cond-mid", "cond-bad");

          // progi jak w MATLAB interpretFuzzy:
          if (condValue >= 0.75) condValEl.classList.add("cond-good");
          else if (condValue >= 0.25) condValEl.classList.add("cond-mid");
          else condValEl.classList.add("cond-bad");
        }

        resetOutputs();
        if (statusEl) statusEl.textContent = "Wpisz dane i kliknij Predict.";

        // PREDICT -> wyślij dane do MATLAB
        predictBtn.addEventListener("click", () => {
          const inputs = readInputs();

          if (!htmlComponent) {
            if (statusEl)
              statusEl.textContent =
                "Brak połączenia z MATLAB (uruchom przez uihtml).";
            return;
          }

          htmlComponent.Data = { action: "predict", inputs: inputs };
        });

        // SAMPLE
        sampleBtn.addEventListener("click", () => {
          // B0018 – przykładowy rekord testowy (zaokrąglone do 3 miejsc)
          id("loadCurrent").value = "1.792";
          id("measuredCurrent").value = "-1.801";
          id("temperature").value = "31.028";
          id("loadVoltage").value = "2.328";
          id("measuredVoltage").value = "3.471";
          id("time").value = "2895.594";

          if (statusEl)
            statusEl.textContent =
              "Wpisano dane testowe B0018. Kliknij Predict.";
        });

        //  CLEAR
        clearBtn.addEventListener("click", () => {
          [
            "loadCurrent",
            "measuredCurrent",
            "temperature",
            "loadVoltage",
            "measuredVoltage",
            "time",
          ].forEach((name) => (id(name).value = ""));
          resetOutputs();
          if (statusEl)
            statusEl.textContent =
              "Wyczyszczono. Wpisz dane i kliknij Predict.";
        });

        //  Odbiór wyników z MATLAB
        if (htmlComponent) {
          htmlComponent.addEventListener("DataChanged", () => {
            const data = htmlComponent.Data;
            if (!data || data.action !== "results") return;

            const soh = data.soh;
            const rul = data.rul;
            const condValue = data.condValue;
            const condLabel = data.condLabel;
            const status = data.status;

            if (sohEl && Number.isFinite(soh))
              sohEl.textContent = soh.toFixed(4);
            if (rulEl && Number.isFinite(rul))
              rulEl.textContent = rul.toFixed(2);

            if (condValEl && Number.isFinite(condValue)) {
              condValEl.textContent = condValue.toFixed(2);
              setConditionColor(condValue);
            } else if (condValEl) {
              condValEl.textContent = "—";
              condValEl.classList.remove("cond-good", "cond-mid", "cond-bad");
            }

            if (condTxtEl)
              condTxtEl.textContent = condLabel ? `(${condLabel})` : "";

            if (statusEl) statusEl.textContent = status ?? "";
          });
        }
      }
    </script>
  </body>
</html>
